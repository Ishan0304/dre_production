project:
  name: dre_production

paths:
  output_root: outputs
  artifacts_dir: outputs/artifacts
  reports_dir: outputs/reports
  data_dir: data

multimodal:
  dataset_name: multimodal_patient_dataset_example
  output_dir: outputs/reports/multimodal_example
  run_multimodal_model: true

ehr:
  dataset_name: multimodal_example_ehr
  inputs:
    diagnoses:
      path: data/raw/mimic_demo/ehr_pipeline/diagnoses.csv
      required_columns:
        - patient_id
        - diagnosis_code
      parse_date_columns: []
    medications:
      path: data/raw/mimic_demo/ehr_pipeline/medications.csv
      required_columns:
        - patient_id
        - medication_name
      parse_date_columns:
        - medication_start
        - medication_end
    seizure_events:
      path: null
      optional: true
      required_columns:
        - patient_id
      parse_date_columns: []
  output_dir: outputs/reports/multimodal_example/ehr

mri:
  dataset_name: multimodal_example_mri
  dataset_root: data/raw/openneuro/ds000030
  output_dir: outputs/reports/multimodal_example/mri

eeg:
  dataset_name: multimodal_example_eeg
  dataset_root: data/raw/chbmit
  output_dir: outputs/reports/multimodal_example/eeg

multimodal_model:
  output_dir: outputs/artifacts/multimodal_example/model
  model_type: logistic_regression
  target_col: ehr_likely_dre
